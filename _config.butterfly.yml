# --------------------------------------
# Navigation 导航菜单
# --------------------------------------
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  # 关于: /about/ || fas fa-heart

# --------------------------------------
# Code Block 代码块
# --------------------------------------
highlight_theme: mac

# --------------------------------------
# Social Settings 社交链接
# --------------------------------------
social:
  fas fa-rss: /atom.xml || RSS
  fab fa-github: https://github.com/MingYan11 || GitHub

# --------------------------------------
# Avatar 头像
# --------------------------------------
avatar:
  img: /images/avatar.png
  effect: true

# --------------------------------------
# Dark Mode 暗黑模式
# --------------------------------------
darkmode:
  enable: true
  button: true
  autoChangeMode: 2

# --------------------------------------
# Top 顶栏配置
# --------------------------------------
# Keywords for site search
# See: https://github.com/next-theme/hexo-generator-searchdb

# --------------------------------------
# Post 文章配置
# --------------------------------------
post_meta:
  page:
    date_type: created
    categories: true
    tags: true
  post:
    date_type: both
    categories: true
    tags: true

# Copyright
copyright:
  enable: true
  license: CC BY-NC-SA 4.0
  licen_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# Post word count
wordcount:
  enable: false

# Reward
reward:
  enable: false
  QR_code:
    - img:

# Related posts
related_post:
  enable: true
  limit: 6
  date_type: created

# --------------------------------------
# Right Sidebar 右侧边栏
# --------------------------------------
aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 一名前端开发者的技术博客
    button:
      enable: true
      icon: fab fa-github
      text: GitHub
      link: https://github.com/MingYan11
  card_announcement:
    enable: true
    content: 分享前端技术、工程化实践与面试经验
  card_recent_post:
    enable: true
    limit: 5
    sort: date
  card_categories:
    enable: true
    limit: 8
  card_tags:
    enable: true
    limit: 40
  card_archives:
    enable: true
  card_webinfo:
    enable: false

# --------------------------------------
# Footer 页脚
# --------------------------------------
footer_bg: false

# --------------------------------------
# PWA
# --------------------------------------
pwa:
  enable: false

# --------------------------------------
# Comments 评论
# --------------------------------------
comments:
  use:
  text: true
  lazyload: true
